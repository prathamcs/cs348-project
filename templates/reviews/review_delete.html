<!DOCTYPE html>
<html>
<head>
    <title>Delete Review</title>
</head>
<body>
    <h1>Delete Review</h1>
    <p>
        <a href="{% url 'review_list' %}">Reviews</a> |
        <a href="{% url 'manage_artists' %}">Artists</a> |
        <a href="{% url 'manage_albums' %}">Albums</a> |
        <a href="{% url 'manage_genres' %}">Genres</a>
    </p>
    <p>Are you sure you want to delete this review for "{{ review.album.title }}"?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Delete</button>
    </form>

    <a href="{% url 'review_list' %}">Cancel</a>
</body>
</html>
