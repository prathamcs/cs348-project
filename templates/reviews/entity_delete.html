<!DOCTYPE html>
<html>
<head>
    <title>Delete {{ entity_label|title }}</title>
</head>
<body>
    <h1>Delete {{ entity_label|title }}</h1>

    <p>
        <a href="{% url 'review_list' %}">Reviews</a> |
        <a href="{% url 'manage_artists' %}">Artists</a> |
        <a href="{% url 'manage_albums' %}">Albums</a> |
        <a href="{% url 'manage_genres' %}">Genres</a>
    </p>

    <p>Are you sure you want to delete "{{ object_label }}"?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Delete</button>
    </form>

    <a href="{% url cancel_url %}">Cancel</a>
</body>
</html>
